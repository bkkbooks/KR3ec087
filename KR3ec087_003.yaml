body:
  text: 卷三木類柏實斆曰凡使先以酒浸一宿至明漉出曬乾用黃精自然汁於日中煎之緩火煮成煎為度每煎柏子仁三兩用酒五兩浸時珍曰此法是服食家用者尋常用只蒸熟曝烈舂簸取仁炒研入藥柏葉斆曰凡用挼去兩畔並心枝了用糯泔浸七日以酒拌蒸一伏時每一斤用黃精自然汁十二兩浸焙又浸又焙待汁乾用之時珍曰此服食治法也常用或生或炒各從本方松脂弘景曰採煉松脂法並在服食方中以桑灰汁或酒煮軟挼納寒水中數十過白滑則可用頌曰凡用松脂先須煉治用大釜加水置甑用白茅籍甑底又加黃砂於茅上厚寸許然後布松脂於上炊以桑薪湯減頻添熱水候松脂盡入釜中乃出之投於冷水既凝又蒸如此三過其白如玉然後入用辛夷斆曰凡用辛夷拭去赤肉毛了以芭蕉水浸一宿用漿水煮之從巳至未取出焙乾用若治眼目中患即一時去皮用向裡實者大明曰入藥微炙沉香觜曰凡使沉香須要不枯如觜角硬重沉於水下者為上半沉者次之不可見火時珍曰欲入丸散以紙裹置懷中待燥研之或入乳鉢以水磨粉曬乾亦可若入煎劑惟磨汁臨時入之楓香脂時珍曰凡用以齏水煮二十沸入冷水中揉扯數十次曬乾用乳香頌曰乳性至黏難碾用時以繒袋掛於窗隙間良久取研乃不黏也大明曰入丸散微炒殺毒則不黏時珍曰或言乳香入丸藥以少酒研如泥以水飛過曬乾用或言以燈心同研則易細或言以糯米數粒同研或言以人指甲二三片同研或言以乳鉢坐熱水中乳之皆易細外丹本草云乳香以韭實蔥蒜煅伏成汁最柔五金丹房鏡源云乳香啞銅沒藥修治同乳香騏驎竭斆曰凡使先研作粉篩過入丸散中用若同衆藥搗則化作塵飛也龍腦香恭曰龍腦香合糯米炭相思子貯之則不耗時珍曰或言以雞毛相思子同入小瓷罐密收之佳相感志言以杉木炭養之更良不耗今人多以樟腦升打亂之不可不辨也相思子即紅豆有小毒樟腦時珍曰凡用每一兩以二碗合住濕紙糊口文武火熁之半時許取出冷定用又法每一兩用黃連薄荷六錢白芷細辛四錢荊芥密蒙花二錢當歸槐花一錢以新土碗鋪杉木片於底安藥在上入水半盞灑腦於上再以一碗合住糊口安火煨之待水乾取開其腦自升於上以翎掃下形似松脂可入風熱眼藥人亦多以亂片腦不可不辨柏木斆曰凡使柏皮削去粗皮用生蜜水浸半日漉出曬乾用蜜塗文武火炙令蜜盡為度每五兩用蜜三兩元素曰二制治上焦單制治中焦不制治下焦也時珍曰黃柏性寒而沉生用則降實火熟用則不傷胃酒製則治上鹽制則治下蜜制則治中厚朴斆曰凡使要紫色味辛者為好刮去粗皮入丸散每一斤用酥四兩炙熟用若入湯飲用自然薑汁八兩炙盡為度大明曰凡入藥去粗皮用薑汁炙或浸炒用宗奭曰味苦不以薑製則棘人喉舌杜仲斆曰凡使削去粗皮每一斤用酥一兩蜜三兩和塗火炙以盡為度細銼用乾漆大明曰乾漆入藥須搗碎炒熟不爾損人腸胃若是濕漆煎乾更好亦有燒存性者椿樗斆曰凡使椿根不近西頭者為上採出拌生蔥蒸半日銼細以袋盛掛屋南畔陰乾用時珍曰椿樗木皮根皮並刮去粗皮陰乾臨時切焙入用楝實斆曰凡採得曬乾酒拌令透蒸待皮軟刮去皮取肉去核用凡使肉不使核使核不使肉如使核捶碎用漿水煮一伏時曬乾其花落子謂之石茱萸不入藥用嘉謨曰石茱萸亦入外科用槐實斆曰凡採得去單子並五子者只取兩子三子者以銅錘錘破用烏牛乳浸一宿蒸過用槐花宗奭曰未開時採收陳久者良入藥炒用染家以水煮一沸出之其稠滓為餅染色更鮮也皂莢斆曰凡使要赤肥並不蛀者以新汲水浸一宿用銅刀削去粗皮以酥反復炙透捶去子弦用每莢一兩用酥五錢好古曰凡用有蜜炙酥炙絞汁燒灰之異各依方法皂莢子斆曰揀取圓滿堅硬不蛀者以甑煮熟剝去硬皮一重取向里白肉兩片去黃以銅刀切曬用其黃消人腎氣無食子斆曰凡使勿犯銅鐵並被火驚用顆小無杴米者妙用漿水於砂盆中研令盡焙乾再研如烏犀色入藥訶黎勒斆曰凡用訶黎勒酒浸後蒸一伏時刀削去路取肉銼焙用用核則去肉櫸木皮斆曰凡使勿用三四年者無力用二十年以來者心空其樹只有半邊向西生者良剝下去粗皮細銼蒸之從巳至未出焙乾用白楊木皮斆曰凡使銅刀刮去粗皮蒸之從巳至未以布袋盛掛屋東角待乾用蘇方木斆曰凡使去上粗皮並節若得中心文橫如紫角者號曰木中尊其力倍常百等須細銼重搗拌細梅樹枝蒸之從巳至申陰乾用巴豆弘景曰巴豆最能瀉人新者佳用之去心皮熬令黃黑搗如膏乃和丸散斆曰凡用巴與豆敲碎以麻油並酒等煮乾研膏用每一兩用油酒各七合大明曰凡入丸散炒用不如去心膜換水煮五度各一沸也時珍曰巴豆有用仁者用殼者用油者有生用者麩炒者醋煮者燒存性者有研爛以紙包壓去油者謂之巴豆霜大風子時珍曰取大風子油法用子三斤去殼及黃油者研極爛瓷器盛之封口入滾湯中蓋鍋密封勿令透氣文武火煎至黑色如膏名大風油可以和藥桑根別録曰採無時出土上者殺人弘景曰東行桑根乃易得而江邊多出土不可輕信時珍曰古本草言桑根見地上者名馬領有毒殺人旁行出土者名伏蛇亦有毒而治心痛故吳淑事類賦云伏蛇療疾馬領殺人斆曰凡使採十年以上向東畔嫩根銅刀刮去青黃薄皮一重取里白皮切焙乾用其皮中涎勿去之藥力俱在其上也忌鐵及鉛或云木之白皮亦可用煮汁染褐色久不落楮實斆曰採得後水浸三日攪旋投水浮者去之曬乾以酒浸一伏時了蒸之從巳至亥焙乾用經驗後方煎法六月六日採取榖即楮子五升以水一斗煮取五升去滓微火煎如餳用枳實弘景曰枳實採破令乾除核微炙令香用以陳者為良俗方多用道家不須斆曰枳實枳殼性效不同若使枳殼取辛苦腥並有隙油者要塵久年深者為佳並去穰核以小麥麩炒至麩焦去麩用梔子斆曰凡使須要如雀腦並須長有九路赤色者為上先去皮須取仁以甘草水浸一宿漉出焙乾搗篩為末用震亨曰治上焦中焦連殼用下焦去殼洗去黃漿炒用治血病炒黑用好古曰去心胸中熱用仁去肌表熱用皮蕤核斆曰凡使蕤核仁以湯浸去皮尖擘作兩片每四兩用芒硝一兩木通草七兩同水煮一伏時取仁研膏入藥山茱萸斆曰凡使以酒潤去核取皮一斤只取四兩以來緩火熬干方用能壯元氣祕精其核能滑精不可服郁李斆曰先以湯浸去皮尖用生蜜浸一宿漉出陰乾研如膏用之衛矛斆曰採得只使箭頭用拭去赤毛以酥拌緩炒每一兩用酥二錢半枸杞地骨皮斆曰凡使根掘得以東流水浸刷去土捶去心以熟甘草湯浸一宿焙乾時珍曰凡用子揀淨枝梗取鮮明者洗淨酒潤一夜搗爛入藥牡荊瀝時珍曰取法用新採荊莖截尺五寸長架於兩磚上中間燒火炙之兩頭以器承取熱服或入藥中又法截三四寸長束入瓶中仍以一瓶合住固外以糠米煨燒其汁瀝入下瓶中亦妙蔓荊實斆曰凡使去蒂子下白膜一重用酒浸一伏時蒸之從巳至未曬乾用時珍曰尋常只去膜打碎用之密蒙花斆曰凡使揀淨酒浸一宿漉出候乾拌蜜令潤蒸之從卯至酉日乾再拌蒸如此三度日乾用每一兩用酒八兩蜜半兩賣子木斆曰凡採得粗搗每一兩用酥五錢同炒乾入藥茯苓斆曰凡用去皮心搗細於水盆中攪濁浮者濾去之此是茯苓赤筋若誤服餌令人瞳子並黑睛點小兼盲目弘景曰作丸散者先煮二三沸仍切曝乾用琥珀斆曰入藥用水調側柏子末安瓷鍋中置琥珀於內煮之從巳至申當有異光搗粉篩用豬苓斆曰採得銅刀削去粗皮薄切以東流水浸一夜至明漉出細切以升麻葉對蒸一日去葉曬乾用時珍曰豬苓取其行濕生用更佳雷丸斆曰凡使用甘草水浸一夜銅刀刮去黑皮破作四五片以甘草水再浸一宿蒸之從巳至未日乾酒拌再蒸日乾用大明曰入藥炮用桑上寄生斆曰採得銅刀和根枝莖葉細銼陰乾用勿見火淡竹瀝機曰將竹截作二尺長劈開以磚兩片對立架竹於上以火炙出其瀝以盤承取時珍一法以竹截長五六寸以瓶盛倒懸下用一器承之周圍以炭火逼之其汁瀝於器下也
