body:
  text: 卷四蟲獸類蜂蜜斆曰凡煉蜜一斤只得十二兩半是數若火少火過並用不得時珍曰凡煉沙蜜每斤入水四兩銀石器內以桑柴火慢煉掠去浮沫至滴水成珠不散乃用謂之水火煉法又法以器盛置重湯中煮一日候滴水不散取用亦佳且不傷火也露蜂房斆曰凡使革蜂窠先以鴉豆枕等同拌蒸從巳至未時出鴉豆枕了曬乾用大明曰入藥並炙用五倍子百藥煎時珍曰用五倍子為粗末每一斤以真茶一兩煎濃汁入酵糟四兩擂爛拌和器盛置粳缸中罯之待發起如發麵狀即成矣捏作餅丸曬乾用嘉謨曰入藥者五倍子鮮者十斤舂細用瓷缸盛稻草蓋盦七日夜取出再搗入桔梗甘草末各二兩又盦一七仍搗仍盦滿七次取出捏餅曬乾用如無鮮者用乾者水漬為之又方五倍子一斤生糯米一兩滾水浸過細茶一兩以上共研末入罐內封固六月要一七取開配合用又方五倍子一斤研末酒麴半斤細茶一把研末上用小蓼汁調勻入鉢中按緊上以長稻草封固另用籮一個多著稻草將藥鉢坐草中上以稻草蓋置淨處過一七後看藥上長起長霜藥則已成矣或捏作丸或作餅曬乾才可收用桑螵蛸別録曰桑螵蛸生桑枝上螳螂子也二月三月採蒸過火炙用不爾令人泄斆曰凡使勿用雜樹生者名螺螺須覓桑樹東畔枝上者採得去核子用沸漿水浸淘七次鍋中熬乾用別作修事無效也韓保升曰三四月採得以熱漿水浸一伏時焙乾於柳木灰中炮黃用殭蠶別録曰生穎川平澤四月取自死者勿令中濕有毒不可用弘景曰人家養蠶時有合箔皆僵者即曝燥都不壞今見小白似有鹽度者為好恭曰蠶自僵死其色自白陶云似有鹽度誤矣頌曰所在養蠶處有之不拘早晚但用白色而條直食桑葉者佳用時去絲綿及子炒過宗奭曰蠶有兩三番惟頭番殭蠶最佳大而無蛆斆曰凡使先以糯米泔浸一日待蠶桑涎出如蝸涎浮水上然後漉出微火焙乾以布拭淨黃肉毛並黑口甲了搗篩如粉入藥樗雞時珍曰凡使去翅足以糯米或用麵炒黃色去米面用斑蝥斆曰凡斑蝥芫青亭長地膽修事並用糯米小麻子相拌炒至米黃黑色取出去頭足兩翅以血餘裹懸東牆角上一夜至明用之則毒去也大明曰入藥須去翅足糯米炒熟不可生用即吐瀉人時珍曰一法用麩炒過醋煮用之也水蛭保升曰採得以䈽竹筒盛待乾用米泔浸一夜曝乾以冬豬脂煎令焦黃然後用之藏器曰收干蛭當展其身令長腹中有子者去之性最難死雖以火炙亦如魚子煙燻經年得水猶活也大明曰此物極難修治須細銼以微火炒色黃乃熟不爾入腹生子為害時珍曰昔有途行飲水及食水菜誤吞水蛭入腹生子為害啖咂臟血腸痛黃瘦者惟以田泥或擂黃土水飲數升則必盡下出也蓋蛭在人腹忽得土氣而下爾或以牛羊熱血一二升同豬脂飲之亦下也蠐螬斆曰凡收得後陰乾與糯米同炒至米焦黑取出去米及身上口畔肉毛並黑塵了作三四截研粉用之時珍曰諸方有乾研及生取汁者又不拘此例也蟬蛻時珍曰凡用蛻殼沸湯洗去泥土翅足漿水煮過曬乾用蜣螂別録曰五月五日採取蒸藏之臨用去足火炙勿置水中令人吐蜚虻大明曰入丸散去翅足炒熟用蟾蜍蜀圖經曰五月五日採得日乾或烘乾用一法去皮爪酒浸一宿又用黃精自然汁浸一宿塗酥炙乾用時珍曰今人皆於端午日捕取風乾黃泥固濟煅存性用之永類鈐方云蟾目赤腹無八字者不可用崔實四民月令云五月五日取蟾蜍可治惡瘡即此也亦有酒浸取肉者錢仲陽治小兒冷熱疳瀉如聖丸用乾者酒煮成膏丸藥亦一法也蟾酥宗奭曰眉間白汁謂之蟾酥以油單紙裹眉裂之酥出紙上陰乾用時珍曰取蟾酥不一或以手捏眉稜取白汁於油紙上及桑葉上插背陰處一宿即自乾白安置竹筒內盛之真者輕浮入口味甜也或以蒜及胡椒等辣物納口中則蟾身白汁出以竹篦刮下面和成塊干之其汁不可入人目令目赤腫盲或以紫草汁洗點即消蛤蟆斆曰凡使蛤蟆先去皮並腸及爪子陰乾每個用真牛酥一分塗炙乾若使黑虎即連頭尾皮爪並陰乾酒浸三日漉出焙用蜈蚣斆曰凡使勿用千足蟲真相似只是頭上有白肉面並嘴尖若誤用並把著腥臭氣入頂能致死也凡制蜈蚣先以蜈蚣木末或柳蛀末於土器中炒令木末焦黑去木末以竹刀刮去足甲用時珍曰蜈蚣木不知是何木也今人惟以火炙去頭足用或去尾足以薄荷葉火煨用之馬陸雷曰凡收得馬陸以粳頭炒至粳焦黑取出去粳竹刀刮去頭足研末用蚯蚓弘景曰若服干蚓須熬作屑斆曰凡收得用糯米泔浸一夜漉出以無灰酒浸一日焙乾切每一兩以蜀椒糯米各二錢半同熬至米熟揀出用時珍曰入藥有為末或化水或燒灰者各隨方法龍骨斆曰凡用龍骨先煎香草湯浴兩度搗粉絹袋盛之用燕子一隻去腸肚安袋於內懸井面上一宿取出研粉入補腎藥中其效如神時珍曰近世方法但煅赤為粉亦有生用者事林廣記云用酒浸一宿焙乾研粉水飛三度用如急用以酒煮焙乾或云凡入藥須水飛過曬乾每斤用黑豆一斗蒸一伏時曬乾用否則著人腸胃晚年作熱也龍齒同龍骨或云以酥炙鼉甲酥炙或酒炙用鯪鯉甲時珍曰方用或炮或燒或酥炙醋炙童便炙或油煎土炒蛤粉炒當各隨本方未有生用者仍以尾甲乃力勝石龍子時珍曰古方用酥炙或酒炙惟治傳尸勞瘵天靈蓋丸以石蜥蜴連腸肚以醋炙四十九遍用之亦一異也蛤蚧斆曰其毒在眼須去眼及甲上尾上腹上肉毛以酒浸透隔兩重紙緩焙令乾以瓷器盛懸屋東角上一夜用之力可十倍勿傷尾也日華曰凡用去頭足洗去鱗鬣內不淨以酥炙用或用蜜炙李珣曰凡用須炙令黃色熟搗口含少許奔走不喘息者為真也宜丸散中用蛇蛻斆曰凡使勿用青黃蒼色者只用白色如銀者先於地下掘坑深一尺二寸安蛻於中一宿取出醋浸炙乾用時珍曰今人用蛇蛻先以皂莢水洗淨纏竹上或酒或醋或蜜浸炙黃用或燒存性或鹽泥固煅各隨方法白花蛇頌曰頭尾各一尺有大毒不可用只用中段乾者以酒浸去皮骨炙過收之則不蛀其骨刺須遠棄之傷人毒與生者同也宗奭曰凡用去頭尾換酒浸三日火炙去盡皮骨此物甚毒不可不防時珍曰黔蛇長大故頭尾可去一尺蘄蛇止可頭尾各去三寸亦有單用頭尾者大蛇一條只得淨肉四兩而已久留易蛀惟取肉密封藏之十年亦不壞也按聖濟總録云凡用花蛇春秋酒浸三宿夏一宿冬五宿取出炭火焙乾如此三次以砂瓶盛埋地中一宿出火氣去皮骨取肉用烏賊魚骨弘景曰炙黃用斆曰凡使勿用沙魚骨其形真似但以上文順者是真橫者是假以血滷作水浸並煮一伏時漉出掘一坑燒紅入魚骨在內經宿取出入藥其效加倍也龜甲以龜甲鋸去四邊石上磨淨灰火炮過塗酥炙黃用亦有酒炙醋炙豬脂炙燒灰用者秦龜甲李珣曰經卜者更妙以酥或酒炙黃用緑毛龜時珍曰此龜古方無用者近世滋補方往往用之大抵與龜甲同功劉氏先天丸用之其法用龜九枚以活鯉二尾安釜中入水覆以米篩安龜在篩上蒸熟取肉曬乾其甲仍以酥炙黃入藥用又有連甲肉頭頸俱用者鱉甲別録曰鱉甲生丹陽池澤採無時頌曰今處處有之以嶽州沅江所出甲有九肋者為勝入藥以醋炙黃用弘景曰採得生取甲剔去肉者為好凡有連厭及干岩者便真若肋骨出者是煮熟不可用斆曰凡使要緑色九肋多裙重七兩者為上用六一泥固瓶子底待乾安甲於中以物支起若治症塊定心藥用頭醋入瓶內大火煎盡三升乃去裙肋骨炙乾入用若治勞去熱藥不用醋用童子小便煎盡一斗二升乃去裙留骨石臼搗粉以雞膍皮裹之取東流水三斗盆盛閣於盆上一宿取用力有萬倍也時珍曰按衛生寶鑑云凡鱉甲以煅灶灰一斗酒五升浸一夜煮令爛如膠漆用更佳桑柴灰尤妙蟹時珍曰凡蟹生烹鹽藏糟收酒浸醬汁浸皆為佳品但久留易沙見燈亦沙得椒易䐈得皂莢或蒜及韶粉可免沙䐈得白芷則黃不散得蔥及五味子同煮則色不變藏蟹名曰蝑蟹音瀉䐈義同黏敗牡蠣宗奭曰凡用須泥固燒為粉亦有生用者斆曰凡用牡蠣先用二十個以東流水入鹽一兩煮一伏時再入火中煅赤研粉用時珍曰按溫隱居云牡蠣將童尿浸四十九日五日一換取出以硫黃末和米醋塗上黃泥固濟煅過用真珠李珣曰凡用以新完未經鑽綴者研如粉方堪服食不細則傷人臟腑斆曰凡用以新淨者絹袋盛之置牡蠣約重四五斤以來於平底鐺中以物四向支穩然後著珠於上乃下地榆五花皮五方草各銼四兩籠住以漿水不住火煮三日夜取出用甘草湯淘淨於臼中搗細重篩更研二萬下方可服食慎微曰抱朴子云真珠徑寸以上服食令人長生以酪漿漬之皆化如水銀以浮石蜂巢蛇黃等物合之可引長三四尺為丸服之時珍曰凡入藥不用首飾及見尸氣者以人乳浸三日煮過如上搗研一法以絹袋盛入豆腐腹中煮一炷香云不傷珠也海蛤斆曰凡使海蛤勿用遊波蟲骨真相似只是面上無光誤餌之令人狂走欲投水如鬼祟惟醋解之立愈其海蛤用漿水煮一伏時每一兩入地骨皮柏葉各二兩煮一伏時東流水淘三次搗粉用保升曰取得以半天河煮五十刻以枸杞汁拌勻入䈽竹筒內蒸一伏時搗用石決明珣曰凡用以麵裹煨熟磨去粗皮爛搗再乳細如面方堪入藥斆曰每五兩用鹽半分同東流水入瓷器內煮一伏時搗末研粉再用五花皮地榆阿膠各十兩以東流水淘三度日乾再研一萬下入藥服至十兩永不得食山桃令人喪目時珍曰今方家只以鹽同東流水煮一伏時研末水飛用蛤粉震亨曰用蛤蜊燒煅成粉不入煎劑時珍曰按吳球云凡用蛤粉取紫口蛤蜊殼炭火煅成以熟栝蔞連子同搗和成團風乾用最妙魁蛤日華曰凡用取陳久者炭火煅赤米醋淬三度出火毒研粉貝子珣曰凡入藥燒過用斆曰凡使勿用花蟲殼真相似只是無效貝子以蜜醋相對浸之蒸過取出以清酒淘研珂斆曰珂要冬採得色白膩者並有白旋水文勿令見火即無用也凡用以銅刀刮末研細重羅再研千下不入婦人藥也甲香斆曰凡使用生茅香皂角同煮半日石臼搗篩用之經驗方曰凡使用黃泥同水煮一日溫水浴過再以米泔或灰汁煮一日再浴過以蜜酒煮一日浴過曝乾用頌曰傳信方載其法云每甲香一斤以泔鬥半微火煮一復時換泔再煮凡三換漉出衆手刮去香上涎物以白蜜三合水一斗微火煮乾又以蜜三合水一斗再煮都三復時以香爛止乃以炭火燒地令熱灑酒令潤鋪香於上以新瓦蓋上一伏時待冷硬石臼木杵搗爛入沉香末三兩麝一分和搗印成以瓶貯之埋過經久方燒凡燒此香須用大火爐多著熱灰剛炭猛燒令盡去之爐旁著火暖水即香不散此法出於劉兗奉禮也宗奭曰甲香善能管香煙與沉檀龍麝香用之尤佳人牙時珍曰兩旁曰牙當中曰齒入藥燒用錢氏小兒方云用人牙燒存性入麝香少許溫酒服半錢治痘瘡倒黶聞人規痘疹論云人牙散治痘瘡方出見倒黶或青紫或變黑用人齒脫落者不拘多少瓦罐固濟煅過出火毒研末用糞清大明曰臘月截淡竹去青皮納糞中浸滲取汁治天行熱疾中毒名糞清弘景曰以空罌塞口納糞中積年得汁甚黑而苦名為黃龍湯療溫病垂死者皆瘥人中黃震亨曰人中黃以竹筒入甘草末於內竹木塞兩頭冬月浸糞缸中立春取出懸風處陰乾破竹取草曬乾用爪甲普濟治破傷風用人手足指甲燒存性六錢薑製南星獨活丹砂各二錢為末分作二服酒下亂髮別録鼻衄亂髮燒灰吹之立已華他中藏經頭髮切入銚內炒存性研斆曰發髲是男子年二十以來無疾患顏貌紅白於頂心剪下者入丸藥膏中用先以苦參水浸一宿漉出入瓶子以火煅赤放冷研用時珍曰今人以皂莢水洗淨曬乾入罐固濟煅存性用亦良天靈蓋藏器曰凡用彌腐爛者乃佳有一片如三指闊者取得用煻火罨一夜待腥穢氣盡卻用童男溺於瓷鍋子中煮一伏時漉出於屋下掘一坑深一尺置骨於中一伏時其藥魂歸神妙陽人使陰陰人使陽好古曰方家有用檀香湯洗過酥炙用或燒存性者男骨色不赤女骨色赤以此別之也人胞吳球曰紫河車古方不分男女近世男用男女用女一云男病用女女病用男初生者為佳次則健壯無病婦人者亦可取得以清米泔擺淨竹器盛於長流水中洗去筋膜再以乳香酒洗過篾籠盛之烘乾研末亦有瓦焙研者酒煮搗爛者甑蒸搗曬者以蒸者為佳董炳云今人皆酒煮火焙及去筋膜大誤矣火焙水煮其子多不育惟蒸搗和藥最良筋膜乃初結真氣不可剔去也胞衣水藏器曰此乃胞衣埋地下七八年化為水澄徹如冰南方人以甘草升麻和諸藥瓶盛埋之三五年後掘出取為藥也豬脂時珍曰凡凝者為肪為脂釋者為膏為油臘月煉淨收用恭曰十二月上亥日取入新瓶埋亥地百日用之名膒脂每升入雞子白十四枚更良弘景曰勿令中水臘月者歷年不壞項下膏謂之負革肪入道家煉五金用白馬陰莖藏器曰凡收當取銀色無病白馬春月遊牝時力勢正強者生取陰乾百日用斆曰用時以銅刀破作七片將生羊血拌蒸半日曬乾以粗布拭去皮及乾血銼碎用阿膠弘景曰凡用皆火炙之斆曰凡用先以豬脂浸一夜取出柳木火上炙燥研用時珍曰今方法或炒成珠或以麵炒或酥炙或以蛤粉炒或以草灰炒或酒化成膏或水化膏當各從本方牛黃斆曰凡用單搗細研如塵絹裹定以黃嫩牛皮裹懸井中一宿去水三四尺明早取之虎骨頌曰虎骨用頭及脛骨色黃者佳凡虎身數物俱用雄虎者勝藥箭射殺者不可入藥其毒浸漬骨血間能傷人也時珍曰凡用虎之諸骨並捶碎去髓塗酥或酒或醋各隨方法炭火炙黃入藥虎睛頌曰虎睛多偽須自獲者乃真斆曰凡使虎睛須問獵人有雌有雄有老有嫩有殺得者惟中毒自死者勿用之能傷人虎睛以生羊血浸一宿漉出微火焙乾搗粉用時珍曰千金治狂邪有虎睛湯虎睛丸並用酒浸炙乾用象膽斆曰凡使勿用雜膽其象膽幹了上有青竹文斑光膩其味微帶甘入藥勿便和衆藥須先搗成粉乃和衆藥按本條大觀政和無犀角弘景曰入藥惟雄犀生者為佳若犀片及見成器物皆被蒸煮不堪用頌曰凡犀入藥有黑白二種以黑者為勝角尖又勝生犀不獨未經水火者蓋犀有捕得殺取者為上蛻角者次之宗奭曰鹿取茸犀取尖其精鋭之力盡在是也以西番生犀磨服為佳入湯散則屑之斆曰凡使勿用奴犀牸犀病水犀攣子犀無潤犀惟取烏黑肌皺坼裂光潤者錯屑入臼杵細研萬匝乃用李珣曰凡犀角鋸成當以薄紙裹於懷中蒸燥乘熱搗之應手如粉故歸田録云翡翠屑金人氣粉犀熊脂斆曰凡取得每一斤入生椒十四個同煉過器盛收之熊掌聖惠方云熊掌難胹義同爛得酒醋水三件同煮熟即大如皮球也羚羊角斆曰凡用有神羊角甚長有二十四節內有天生木胎此角有神力可抵千牛凡使不可單用須要不拆元對繩縛鐵銼銼細重重密裹避風以旋旋取用搗極細更研萬匝入藥免刮人腸鹿茸別録曰四月五月解角時取陰乾使時燥恭曰鹿茸夏收之陰乾百不收一且易臭惟破之火干大好斆曰凡使鹿茸用黃精自然汁浸兩日夜漉出切焙搗用免渴人也又法以鹿茸鋸作片每五兩用羊脂三兩拌天靈蓋末塗之慢火炙令內外黃脆以鹿皮裹之安室中一宿則藥魂歸矣乃慢火焙乾搗末用日華曰只用酥炙炒研宗奭曰茸上毛先以酥薄塗勻於烈焰中灼之候毛盡微炙不以酥則火焰傷茸矣時珍曰淡寮濟生諸方有用酥炙酒炙及酒蒸焙用者當各隨本方鹿角詵曰凡用鹿角麋角並截段錯屑以蜜浸過微火焙令小變色曝乾搗篩為末或燒飛為丹服之至妙以角寸截泥裹於器中大火燒一日如玉粉也時珍曰按崔行功纂要方鹿角粉法以鹿角寸截炭火燒過搗末水和成團以絹袋三五重盛之再煅再和如此五度以牛乳和再燒過研用白膠一名鹿角膠別録曰白膠生雲中煮鹿角作之弘景曰今人少復煮作惟合角弓用之其法先以米瀋汁漬七日令軟煮煎如作阿膠法耳又一法銼角令細入干牛皮一片即易消爛不爾雖百年無一熟也恭曰鹿角麋角但煮濃汁重煎即為膠矣何必使爛欲求爛亦不難陶未見耳詵曰作膠法細破寸截以河水浸七日令軟方煮之斆曰採全角鋸開並長三寸以物盛於急水中浸一百日取出刀刮去黃皮拭淨以釅醋煮七日旋旋添醋勿令少歇戌時不用著火只從子至戌也日足角白色軟如粉搗爛每十兩入無灰酒一鎰煮成膠陰乾研篩用時珍曰今人呼煮爛成粉者為鹿角霜取粉熬成膠或只以濃汁熬成膏者為鹿角膠按胡熒衛生方云以米泔浸鹿角七日令軟入急流水中浸七日去粗皮以東流水桑柴火煮七日旋旋添水入醋少許搗成霜用其汁加無灰酒熬成膠用又邵以正濟急方云用新角三對寸截盛於長流水浸三日刮淨入楮實子桑白皮黃蠟各二兩鐵鍋中水煮三日夜不可少停水少即添湯日足取出刮淨曬研為霜韓懋醫通云以新鹿角寸截囊盛於流水中浸七日以瓦缶入水桑柴火煮每一斤入黃蠟半斤以壺掩住水少旋添其角軟以竹刀刮淨搗為霜用麋角斆曰麋角頂根上有黃毛若金線兼旁生小尖也色蒼白者為上詵曰凡用麋角可五寸截之中破炙黃為末入藥時珍曰麋鹿茸角今人罕能分別陳自明以小者為鹿茸大者為麋茸亦臆見也不若親視其採取時為有準也造麋角膠麋角霜並與鹿角膠鹿角霜同法又集靈方云用麋角一雙水浸七日刮去皮銼屑以銀瓶盛牛乳浸一日乳耗再加至不耗乃止用油紙密封瓶口別用大麥鋪鍋中三寸上安瓶再以麥四周填滿入水浸一伏時水耗旋加待屑軟如面取出焙研成霜用附麋茸修治與鹿茸同麝香斆曰凡使麝香用當門子尤妙以子日開之微研用不必苦細也貓屎臘月採乾者泥固燒存性收用膃肭臍斆曰用酒浸一日紙裹炙香銼搗或於銀器中以酒煎熟合藥時珍曰以漢椒樟腦同收則不壞蝟皮細銼炒黑入藥雄雀屎日華曰凡鳥右翼掩左者是雄其屎頭尖挺直斆曰凡使勿用雀兒糞雀兒口黃未經淫者也其雀蘇底坐尖在上是雄兩頭圓者是雌陰人使雄陽人使雌臘月採得去畔附著者鉢中研細以甘草水浸一夜去水焙乾用時珍曰別録止用雄雀屎雌雄分用則出自雷氏也伏翼斆曰凡使要重一斤者先拭去肉上毛及去爪腸留肉翅並嘴腳以好酒浸一宿取出以黃精自然汁五兩塗炙至盡炙乾用時珍曰近世用者多煅存性耳天鼠屎時珍曰凡採得以水淘去灰土惡氣取細沙曬乾焙用其沙乃蚊蚋眼也五靈脂頌曰此物多夾沙石絶難修治凡用研為細末以酒飛去沙石曬乾收用鴟頭弘景曰雖不限雌雄雄者當勝用須微炙不用蠹者古方治頭面方有鴟頭酒
