body:
  text: 卷一玉石類白堊斆曰凡使勿用色青並底白者搗篩末以鹽湯飛過曝乾用則免結澀人腸也每堊二兩用鹽一分大明曰入藥燒用不入湯飲梁上塵斆曰凡梁上塵須去煙火大遠高堂殿上者拂下篩淨末用時珍曰凡用倒掛塵燒令煙盡篩取末入藥雷氏所說似是梁上灰塵今人不見用銀屑弘景曰醫方鎮心丸用之不可正服為屑當以水銀研令消也恭曰方家用銀屑取見成銀箔以水銀硝之為泥合硝石及鹽研為粉燒出水銀淘去鹽石為粉極細用之乃佳不得只磨取屑耳時珍曰入藥只用銀箔易細若用水銀鹽硝制者反有毒矣龍木論謂之銀液又有錫箔可僞宜辨之赤銅屑時珍曰即打銅落下屑也或以紅銅火煅水淬亦自落下以水淘淨用好酒入沙鍋內炒見火星取研末用自然銅斆曰採得石髓鉛捶碎同甘草湯煮一伏時至明漉出攤令乾入臼中搗了重篩過以醋浸一宿至明用六一泥泥瓷盒子盛二升文武火中養三日夜才幹用蓋蓋了火煅兩伏時去土研如粉用凡修事五兩以醋兩鎰為度時珍曰今人只以火煅醋淬七次研細水飛過用鉛時珍曰凡用以鐵銚熔化瀉瓦上濾去渣腳如此數次收用其黑錫灰則以鉛沙取黑灰白錫灰不入藥鉛霜頌曰鉛霜用鉛雜水銀十五分之一合煉作片置醋甕中密封經久成霜時珍曰以鉛打成錢穿成串瓦盆盛生醋以串橫盆中離醋三寸仍以瓦盆覆之置陰處候生霜刷下仍合住密陀僧斆曰凡使搗細安瓷鍋中重紙袋盛柳蛀末焙之次下東流水浸滿火煮一伏時去柳末紙袋取用鐵華粉志曰作鐵華粉法取鋼煅作葉如笏或團平面磨錯令光淨以鹽水灑之於醋甕中陰處埋之一百日鐵上衣生即成粉矣刮取細末搗篩入乳鉢研如面和合諸藥為丸散此鐵之精華功用強於鐵粉也大明曰懸於醬瓿上生霜者名鐵胤粉淘去粗滓鹹味烘乾用玉屑弘景曰玉屑是以玉為屑非別一物也仙經服㲄玉有搗如米粒乃以苦酒輩消令如泥亦有合為漿者凡服玉皆不得用已成器物及冢中玉璞恭曰餌玉當以消作水者為佳屑如麻豆服者取其精潤臟腑滓穢當完出也又為粉服者即使人淋壅屑如麻豆其義殊深化水法在淮南三十六水法中玉泉青霞子曰作玉漿法玉屑一升地榆草一升稻米一升取白露二升銅器中煮米熟絞汁玉屑化為水以藥納入所謂神仙玉漿也藏器曰以玉投朱草汁化成醴朱草瑞草也術家取蟾蜍膏軟玉如泥以苦酒消之成水雲母斆曰凡使黃黑者厚而頑赤色者經婦人手把者並不中用須要光瑩如冰色者為上每一斤用小地膽草紫背天葵生甘草地黃汁各一鎰乾者細銼濕者取汁了於瓷堝中安置下天池水三鎰著火煮七日夜水火勿令失度雲母自然成碧玉漿在堝底卻以天池水猛投其中攪之浮如蝸涎者即去之如此三度淘淨取沉香一兩搗作末以天池水煎沉香湯三升以來分為三度再淘雲母漿了日曬任用抱朴子曰服五云之法或以桂蔥水玉化之為水或以露於鐵器中以玄水熬之為水或以硝石合於筒中埋之為水或以蜜溲為酪或以秋露漬之百日韋囊挻以為粉或以無顛草樗血合餌之服至一年百病除三年反老成童五年役使鬼神胡演曰煉粉法八九月間取雲母以礬石拌勻入瓦罐內封口三伏時則自柔軟去礬次日取百草頭上露水漬之百日韋囊挻以為粉時珍曰道書言鹽湯煮雲母可為粉又云雲母一斤鹽一斗漬之銅器中蒸一日臼中搗成粉又云雲母一斤白鹽一升同搗細入重布袋挼之沃令鹽味盡懸高處風吹自然成粉紫石英時珍曰凡入丸散用火煅醋淬七次碾末水飛過曬乾入藥丹砂斆曰凡修事硃砂靜室焚香齊沐後取砂以香水浴過拭乾碎搗之鉢中更研三伏時取一瓷鍋子每硃砂五兩用甘草二兩紫背天葵一鎰五方草一鎰著砂上下以東流水煮三伏時勿令水火闕去藥以東流水淘淨干曬又研如粉用小瓷瓶入青芝草山須草半兩蓋之下十斤火煅從巳至子方歇候冷取出細研用如要服則以熬蜜丸細麻子大空腹服一丸時珍曰今法惟取好砂研末以流水飛三次用其末砂多雜石末鐵屑不堪入藥又法以絹袋盛砂用蕎麥灰淋汁煮三伏時取出流水浸洗過研粉飛曬用又丹砂以石膽硝石和埋土中可化為水水銀斆曰凡使勿用草汞並舊朱漆中者經別藥制過者在尸中過者半生半死者其硃砂中水銀色微紅收得後用葫蘆貯之免遺失若先以紫背天葵並夜交藤自然汁二味同煮一伏時其毒自退若修十兩二汁各七鎰水銀粉時珍曰升煉輕粉法用水銀一兩白礬二兩食鹽一兩同研不見星鋪於鐵器內以小烏盆覆之篩灶灰鹽水和封固盆口以炭火打二炷香取開則粉升於盆上矣其白如雪輕盈可愛一兩汞可升粉八錢又法水銀一兩皂礬七錢白鹽五錢同研如上升煉又法先以皂礬四兩鹽一兩焰硝五錢如炒黃為曲水銀一兩又曲二兩白礬二錢研勻如上升煉海客論云諸礬不與水銀相合而緑礬和鹽能制水銀成粉何也蓋水銀者金之魂魄緑礬者鐵之精華二氣同根是以暫製成粉無鹽則色不白粉霜時珍曰升煉法用真汞粉一兩入瓦罐內令勻以燈盞仰蓋罐口鹽泥塗縫先以小炭火鋪罐底四周圍以水濕紙不住手在燈盞內擦勿令間斷逐漸加火至罐頸住火冷定取出即成霜如白蠟按外臺祕要載古方崔氏造水銀霜法云用水銀十兩石硫黃十兩各以一鐺熬之良久銀熱黃消急傾入一鐺少緩即不相入仍急攪之良久硫成灰銀不見乃下伏龍肝末十兩鹽末一兩攪之別以鹽末鋪鐺底一分入藥在上又以鹽末蓋面一分以瓦盆覆之鹽土和泥塗縫炭火煅一伏時先文後武開盆刷下凡一轉後分舊土為四分以一分和霜入鹽末二兩如前法飛之訖又以土一分鹽末二兩和飛如前凡四轉土盡更用新土如此七轉乃成霜用之此法後人罕知故附於此云靈砂慎微曰靈砂用水銀一兩硫黃六銖細研炒作青砂頭後入水火既濟爐抽之如束針紋者成就也時珍曰按胡演丹藥祕訣云升靈砂法用新鍋安逍遙爐上蜜揩鍋底文火下燒入硫黃二兩熔化投水銀半斤以鐵匙急攪作青砂頭如有焰起噴醋解之待汞不見星取出細研盛入水火鼎內鹽泥固濟下以自然火升之乾水十二盞為度取出如束針紋者成矣庚辛玉冊云靈砂者至神之物也硫汞制而成形謂之丹基奪天地造化之功竊陰陽不測之妙可以變化五行煉成九還其未升鼎者謂之青金丹頭已升鼎者乃曰靈砂靈砂有三以一伏時周天火而成者謂之金鼎靈砂以九度抽添用周天火而成者謂之九轉靈砂以地數三十日炒煉而成者謂之醫家老火靈砂並宜桑灰淋醋煮伏過用乃良雄黃斆曰每雄黃三兩以甘草紫背天葵地膽碧稜花各五兩細銼東流水入坩堝中煮三伏時漉出搗如粉水飛澄去黑者曬乾再研用其內有劫鐵石又號赴矢黃能劫於鐵並不入藥用思邈曰凡服食用武都雄黃須油煎九日九夜乃可入藥不爾有毒慎勿生用時珍曰一法用米醋入蘿蔔汁煮乾用良抱朴子曰餌法或以蒸煮或以硝石化為水或以豬脂裹蒸之於赤土下或以松脂和之或以三物煉之引之如布白如冰服之令人長生除百病殺三蟲伏火者可點銅成金變銀成金雌黃斆曰凡修事勿令婦人雞犬新犯淫人有患人不男人非形人及曾是刑獄臭穢之地犯之則雌黃黑如鐵色不堪用也反損人壽每四兩用天碧枝和陽草粟遂子草各五兩入瓷鍋中煮三伏時其色如金汁一垛在鍋底下用東流水猛投於中如此淘三度去水拭乾臼中搗篩研如塵用又曰雌得芹花立便成庚芹花一名立起草形如芍藥煮雌能住火也石膏斆曰凡使石臼中搗成粉羅過生甘草水飛過澄曬篩研用時珍曰古法惟打碎如豆大絹包入湯煮之近人因其性寒火煅過用或糖拌炒過則不妨脾胃滑石斆曰凡用白滑石先以刀刮淨研粉以牡丹皮同煮一伏時去牡丹皮取滑石以東流水淘過曬乾用五色石脂斆曰凡使赤脂研如粉新汲水飛過三度曬乾用時珍曰亦有火煅水飛者爐甘石時珍曰凡用爐甘石以炭火煅紅童子小便淬七次水洗淨研粉水飛過曬用井泉石禹錫曰凡用細研水飛過不爾令人淋石鐘乳斆曰凡使勿用頭粗厚並尾大者為孔公石不用色黑及經大火驚過並久在地上收者曾經藥物制者並不得用須要鮮明薄而有光潤者似鵝翎筒子為上有長五六寸者凡修事法鍾乳八兩用沉香零陵香藿香甘松白茅各一兩水煮過再煮汁方用煮乳一伏時漉出以甘草紫背天葵各二兩同煮漉出拭乾緩火焙之入臼杵粉篩過入鉢中令有力少壯者二三人不住研三日三夜勿歇然後以水飛澄過絹籠於日中曬乾入鉢再研二萬遍乃以瓷盒收之慎微曰太清經煉鍾乳法取好細末置金銀器中瓦一片密蓋勿令泄氣蒸之自然化作水也李補闕煉乳法見後陽起石大明曰凡入藥燒後水煅用之凝白者佳時珍曰凡用火中煅赤酒淬七次研細水飛過日乾亦有用燒酒浸過同樟腦入罐升煉取粉用者磁石斆曰凡修事一斤用五花皮一鎰地榆一鎰故綿十五兩三件並銼於石上捶碎作二三十塊將石入瓷瓶中下草藥以東流水煮三日夜漉出拭乾布裹再捶細乃碾如塵水飛過再碾用宗奭曰入藥須火燒醋淬研末水飛或醋煮三日夜代赭石斆曰凡使研細以臘水重重飛過水面上有赤色如薄雲者去之乃用細茶腳湯煮一伏時取出又研一萬匝以淨鐵鐺燒赤下白蜜蠟一兩待化投新汲水沖之再煮一二十沸取出曬乾用時珍曰今人惟煅赤以醋淬三次或七次研水飛過用取其相制併為肝經血分引用也相感志云代赭以酒醋煮之插鐵釘於內扇之成汁禹餘糧弘景曰凡用細研水洮取汁澄之勿令有沙土也斆曰見太一下太一餘糧斆曰凡修事用黑豆五合黃精五合水二斗煮取五升置瓷鍋中下餘糧四兩煮之旋添汁盡為度其藥氣自然香如新米搗了又研一萬杵方用曾青斆曰凡使勿用夾石及銅青每一兩要紫背天葵甘草青芝草三件乾溼各一鎰細銼放瓷鍋內安青於中東流水二鎰緩緩煮之五晝夜勿令水火失時取出以東流水浴過研乳如粉用砒石斆曰凡使用以小瓷瓶盛後入紫背天葵石龍芮二味火煅從巳至申便用甘草水浸從申至子出拭乾入瓶再煅別研三萬下用時珍曰醫家皆言生砒經見火則毒甚而雷氏治法用火煅今所用多是飛煉者蓋皆欲求速效不惜其毒也曷若用生者為愈乎土黃時珍曰用砒石二兩木鱉子仁巴豆仁各半兩硇砂二錢為末用木鱉子油石腦油和成一塊油裹埋土坑內四十九日取出劈作小塊瓷器收用礞石時珍曰用大坩堝一個以礞石四兩打碎入硝石四兩拌勻炭火十五斤簇定煅至硝盡其石色如金為度取出研末水飛去硝毒曬乾用花乳石時珍曰凡入丸散以罐固濟頂火煅過出火毒研細水飛曬乾用金牙石大明曰入藥燒赤去粗乃用蛇黃大明曰入藥燒赤醋淬三四次研末水飛用食鹽時珍曰凡鹽人多以礬硝灰石之類雜之入藥須以水化澄去腳滓煎煉白色乃良凝水石斆曰凡使須用生薑自然汁煮乾研粉用每十兩用生薑一鎰也玄明粉時珍曰製法用白淨朴硝十斤長流水一石煎化去滓星月下露一夜去水取硝每一斗用蘿蔔一斤切片同煮熟濾淨再露一夜取出每硝一斤用甘草一兩同煎去滓再露一夜取出以大沙罐一個築實盛之鹽泥固濟厚半寸不蓋口置爐中以炭火十斤從文至武煅之待沸定以瓦一片蓋口仍前固濟再以十五斤頂火煅之放冷一伏時取出隔紙安地上盆覆三日出火毒研末每一斤入生甘草末一兩炙甘草末一兩和勻瓶收用硝石大明曰真硝石柳枝湯煎三周時如湯少即加熱者伏火即止斆曰凡使硝石先研如粉用雞腸菜柏子仁共二十五個和作一處丸如小帝珠子以瓷瓶子於五斤火中煅赤投硝石四兩於瓶內連投藥丸入瓶自然伏火也抱朴子曰能消柔五金化七十二石為水制之須用地蓮子豬牙皂角苦參南星巴豆漢防己晚蠶砂時珍曰熔化投甘草入內即伏火硇砂宗奭曰凡用須水飛過去塵穢入瓷器中重湯煮乾則殺其毒時珍曰今時人多用水飛淨醋煮乾如霜刮下用之石硫黃斆曰凡使勿用青赤色及半白半青半赤半黑者自有黃色內瑩淨似物命者貴也凡用四兩先以龍尾蒿自然汁一鎰東流水三鎰紫背天葵汁一鎰粟逐子莖汁一鎰四件合之攪令勻一坩堝用六乙泥固濟底下將硫黃碎之入鍋中以前汁旋旋添入火煮汁盡為度再以百部末十兩柳蚛末二斤一簇草二斤細銼以東流水同硫黃煮二伏時取出去諸藥用熟甘草湯洗了入鉢研二萬匝用時珍曰凡用硫黃入丸散用須以蘿蔔剜空入硫在內合定稻糠火煨熟去其臭氣以紫背浮萍同煮過消其火毒以皂莢湯淘之去其黑漿一法打碎以絹袋盛用無灰酒煮三伏時用又硝石能化硫為水以竹筒盛硫埋馬糞中一月亦成水名硫黃液礬石斆曰凡使白礬石以瓷瓶盛於火中煅令內外通赤用鉗揭起蓋旋安石蜂巢入內燒之每十兩用巢六兩燒盡為度取出放冷研粉以紙裹安五寸深土坑中一宿取用又法取光明如水晶酸咸澀味全者研粉以瓷瓶用六一泥泥之待乾入粉三升在內旋旋入五方草紫背天葵各自然汁一鎰下火逼令藥汁干蓋了瓶口更泥上下用火一百斤煅之從巳至未去火取出其色如銀研如輕粉用之時珍曰今人但煅干汁用謂之枯礬不煅者為生礬若入服食須循法度按九鼎神丹祕訣煉礬石入服食法用新桑合槃一具於密室淨掃以火燒地令熱灑水於上或灑苦酒於上乃布白礬於地上以槃覆之四面以灰擁定一日夜其石精皆飛於槃上掃取收之未盡者更如前法數遍乃止此為礬精若欲作水即以掃下礬精一斤納三年苦酒一斗中清之號曰礬華百日彌佳若急用之七日亦可風化硝時珍曰以芒硝於風日中消盡水氣自成輕飄白粉也或以瓷瓶盛掛檐下待硝滲出瓶外刮下收之別有甜瓜盛硝滲出刮收者或黃牯牛膽囊收硝刮取皆非甜硝也
