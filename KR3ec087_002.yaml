body:
  text: 卷二草類甘草雷斆曰凡使須去頭尾尖處其頭尾吐人每用切長三寸掰作六七片入瓷器中盛用酒浸蒸從巳至午取出曝乾銼細用一法每斤用酥七兩塗炙酥盡為度又法先炮令內外赤黃用時珍曰方書炙甘草皆用長流水蘸濕炙之至熟刮去赤皮或用漿水炙熟未有酥炙酒蒸者大抵補中宜炙用瀉火宜生用黃耆斆曰凡使勿用木耆草真相似只是生時葉短並根橫也須去頭上皺皮蒸半日擘細於槐砧上銼用時珍曰今人但捶扁以蜜水塗炙數次以熟為度亦有以鹽湯潤透器盛於湯瓶蒸熟切用者人參弘景曰人參易蛀蚛唯納新器中密封可經年不壞炳曰人參頻見風日則易蛀惟用盛過麻油瓦罐泡淨焙乾入華陰細辛與參相間收之密封可留經年一法用淋過灶灰曬乾罐收亦可李言聞曰人參生時背陽故不喜見風日凡生用宜㕮咀熟用宜隔紙焙之或醇酒潤透㕮咀焙熟用並忌鐵器桔梗斆曰凡使勿用木梗真似桔梗只是咬之腥澀不堪凡用桔梗須去頭上尖硬二三分以來並兩畔附枝於槐砧上細銼用生百合搗膏投水中浸一伏時濾出緩火熬令乾用每桔梗四兩用百合二兩五錢時珍曰今但刮去浮皮米泔水浸一夜切片微炒用黃精斆曰凡採得以溪水洗淨蒸之從巳至子薄切曝乾用頌曰羊公服黃精法二月三月採根入地八九寸為上細切一石以水二石五斗煮去苦味漉出囊中壓取汁澄清再煎如膏乃止以炒黑黃豆末相和得所捏作餅子如錢大初服二枚日益之亦可焙乾篩末水服詵曰餌黃精法取甕子去底釜內安置得所入黃精令滿密蓋蒸至氣溜即曝之如此九蒸九曝若生則刺人咽喉若服生者初時只可一寸半漸漸增之十日不食服止三尺五寸三百日後盡見鬼神久必昇天根葉花實皆可食之但以相對者是正不對者名偏精也葳蕤斆曰凡使勿用黃精並鉤吻二物相似葳蕤節上有鬚毛莖斑葉尖處有小黃點為不同採得以竹刀刮去節皮洗淨以蜜水浸一宿蒸了焙乾用知母斆曰凡使先於槐砧上銼細焙乾木臼杵搗勿犯鐵器時珍曰凡用揀肥潤里白者去毛切引經上行則用酒浸焙乾下行則用鹽水潤焙肉蓯蓉斆曰凡使先須清酒浸一宿至明以棕刷去沙土浮甲劈破中心去白膜一重如竹絲草樣有此能隔人心前氣不散令人上氣也以甑蒸之從午至酉取出又用酥炙得所赤箭斆曰修事天麻十兩銼安於瓶中用蒺藜子一鎰緩火熬焦蓋於天麻上以三重紙封系從巳至未取出蒺藜炒過蓋系如前凡七遍用布拭上氣汗刀劈焙乾並搗用若用御風草亦同此法時珍曰此乃治風痹藥故如此修事也若治肝經風虛惟洗淨以濕紙包於糠火中煨熟取出切片酒浸一宿焙乾用蒼朮大明曰用術以米泔浸一宿入藥宗奭曰蒼朮辛烈須米泔浸洗再換泔浸二日去上粗皮用時珍曰蒼朮性燥故以糯米泔浸去其油切片焙乾用亦有用脂麻同炒以制其燥者狗脊斆曰凡修事火燎去須細銼了酒浸一夜蒸之從巳至申取出曬乾用時珍曰今人惟銼炒去毛須用巴戟天斆曰凡使須用枸杞子湯浸一宿待稍軟漉出再酒浸一伏時漉出同菊花熬焦黃去菊花以布拭乾用時珍曰今法惟以酒浸一宿銼焙入藥若急用只以溫水浸軟去心也遠志斆曰凡使須去心否則令人煩悶仍用甘草湯浸一宿曝乾或焙乾用淫羊藿斆曰凡使時呼仙靈脾以夾刀夾去葉四畔花枝每一斤用羊脂四兩拌炒待脂盡為度仙茅斆曰採得以清水洗刮去皮於槐砧上用銅刀切豆許大以生稀布袋盛於烏豆水中浸一宿取出用酒拌濕蒸之從巳至亥取出曝乾勿犯鐵器及牛乳斑人鬢須大明曰彭祖單服法以竹刀刮切糯米泔浸去赤汁出毒後無妨損玄參斆曰凡採得後須用蒲草重重相隔入甑蒸兩伏時曬乾用勿犯銅器餌之噎人喉喪人目紫草斆曰凡使每一斤用蠟三兩溶水拌蒸之待水乾取去頭並兩畔髭細銼用黃連斆曰凡使以布拭去肉毛用漿水浸二伏時漉出於柳木火上焙乾用時珍曰五臟六腑皆有火平則治動則病故有君火相火之說其實一氣而已黃連入手少陰心經為治火之主藥治本臟之火則生用之治肝膽之實火則以豬膽汁浸炒治肝膽之虛火則以醋浸炒治上焦之火則以酒炒治中焦之火則以薑汁炒治下焦之火則以鹽水或朴硝研細調水和炒治氣分濕熱之火則以茱萸湯浸炒治血分塊中伏火則以乾漆末調水炒治食積之火則以黃土研細調水和炒諸法不獨為之引導蓋辛熱能制其苦寒鹹寒能制其燥性在用者詳酌之秦艽斆曰秦艽須於腳文處認取左文列為秦治疾右文列為艽即髮腳氣凡用秦以布拭去黃白毛乃用還元湯浸一宿日乾用時珍曰秦艽但以左文者為良分秦與艽為二名謬矣柴胡斆曰凡採得銀州柴胡去須及頭用銀刀削去赤薄皮少許以粗布拭盡銼用勿令犯火立便無效也前胡斆曰修事先用刀刮去蒼黑皮並髭土了細銼以甜竹瀝浸令潤日中曬乾用獨活斆曰採得細銼以淫羊藿拌裛二日曝乾去藿用免煩人心時珍曰此乃服食家治法尋常去皮或焙用爾升麻斆曰採得刮去粗皮用黃精自然汁浸一宿曝乾銼蒸再曝用時珍曰今人惟取里白外黑而緊實者謂之鬼臉升麻去須及頭蘆銼用苦參斆曰採根用糯米濃泔汁浸一宿其腥穢氣並浮在水面上須重重淘過即蒸之從巳至申取曬切用貝母斆曰凡使先於柳木灰中炮黃擘破去內口鼻中有米許大者心一顆後拌糯米於𨫼上同炒待米黃去米用龍膽斆曰採得陰乾用時銅刀切去須土頭了銼細甘草湯浸一宿漉出曝乾用細辛斆曰凡使細辛切去頭土了以瓜水浸一宿曝乾用須揀去雙葉者服之害人鬼督郵斆曰凡採得細銼用生甘草水煮一伏時日乾用徐長卿斆曰凡採得粗杵拌少蜜令遍以瓷器盛蒸三伏時日乾用白薇斆曰凡採得以糯米泔汁浸一宿取出去髭於槐砧上細銼蒸之從巳至申曬乾用時珍曰後人惟以酒洗用白前斆曰凡用以生甘草水浸一伏時漉出去頭須了焙乾收用當歸斆曰凡用去蘆頭以酒浸一宿入藥止血破血頭尾效各不同若要破血即使頭一節硬實處若要止痛止血即用尾若一併用服食無效不如不使惟單使妙也元素曰頭止血尾破血身和血全用即一破一止也先以水洗淨土治上酒浸治外酒洗過或火干日乾入藥杲曰頭止血而上行身養血而中守梢破血而下流全活血而不走時珍曰雷張二氏所說頭尾功效各異凡物之根身半以上氣脈上行法乎天身半以下氣脈下行法乎地人身法象天地則治上當用頭治中當用身治下當用尾通治則全用乃一定之理也當以張氏之說為優凡曬乾乘熱紙封甕收之不蛀蛇床斆曰凡使須用濃藍汁並百部草根自然汁同浸一伏時漉出日乾卻用生地黃汁相拌蒸之從巳至亥取出日乾用大明曰凡服食即挼去皮殼取仁微炒殺毒即不辣也作湯洗浴則生用之白芷斆曰採得刮去土皮細銼以黃精片等分同蒸一伏時曬乾去黃精用時珍曰今人採根洗刮寸截以石灰拌勻曬收防其易蛀並欲色白也入藥微焙芍藥斆曰凡採得竹刀刮去皮並頭土銼細以蜜水拌蒸從巳至未曬乾用時珍曰今多生用惟避中寒者以酒炒入女人血藥以醋炒耳牡丹斆曰凡採得根日乾以銅刀劈破去骨銼如大豆許用清酒拌蒸從巳至未日乾用木香時珍曰凡入理氣藥只生用不見火若實大腸宜麵煨熟用杜若斆曰凡使勿用鴨喋草根真相似只是味效不同凡採得根以刀刮去黃赤皮細銼用三重絹袋陰乾臨使以蜜浸一夜漉出用高良薑時珍曰高良薑紅豆蔻並宜炒過入藥亦有以姜同吳茱萸東壁土炒過入藥用者豆蔻斆曰凡使須去蒂取向裡子及皮用茱萸同於𨫼上緩炒待茱萸微黃黑即去茱萸取草豆蔻皮及子杵用之時珍曰今人惟以麵裹煻火煨熟去皮用之蓽茇斆曰凡使去挺用頭以醋浸一宿焙乾以刀刮去皮粟子令淨乃用免傷人肺令人上氣蒟醬斆曰凡採得後以刀刮去粗皮搗細每五兩用生薑自然汁五兩拌之蒸一日曝乾用肉豆蔻斆曰凡使須以糯米粉熟湯搜裹豆蔻於煻灰火中煨熟去粉用勿令犯鐵補骨脂斆曰此性燥毒須用酒浸一宿漉出以東流水浸三日夜蒸之從巳至申日乾用一法以鹽同炒過曝乾用蓬莪朮斆曰凡使於砂盆中以醋磨令盡然後於火畔熁干重篩過用頌曰此物極堅硬難搗治用時熱灰火中煨令透乘熱搗之即碎如粉時珍曰今人多以醋炒或煮熟入藥取其引入血分也荊三稜元素曰入藥用須炮熟時珍曰消積須用醋浸一日炒或煮熟焙乾入藥乃良香附子斆曰凡採得陰乾於石臼中搗之切忌鐵器時珍曰凡採得連苗曝乾以火燎去苗及毛用時以水洗淨石上磨去皮用童子小便浸透洗曬搗用或生或炒或以酒醋鹽水浸諸法各從本方生則上行胸膈外達皮膚熟則下走肝腎外徹腰足炒黑則止血得童溲浸炒則入血分而補虛鹽水浸炒則入血分而潤燥青鹽炒則補腎氣酒浸炒則行經絡醋浸炒則消積聚薑汁炒則化痰飲又稻草煮之味不苦澤蘭斆曰凡用大小澤蘭細銼以絹袋盛懸於屋南畔角上令乾用又蘭草葉修治同澤蘭香薷斆曰凡採得去根留葉銼曝乾勿令犯火服至十兩一生不得食白山桃也時珍曰八九月開花著穗時採之陰乾入用赤車使者斆曰此草原名小錦枝凡用並粗搗以七歲童子小便拌蒸曬乾入藥艾宗奭曰艾葉乾搗去青滓取白入石硫黃末少許謂之硫黃艾炙家用之得米粉少許可搗為末入服食藥用時珍曰凡用艾葉須用陳久者治令細軟謂之熟艾若生艾灸火則傷人肌脈故孟子曰七年之病求三年之艾揀取淨葉揚去塵屑入石臼內木杵搗熟羅去渣滓取白者再搗至柔爛如綿為度用時焙燥則灸火得力入婦人丸散須以熟艾用醋煮乾搗成餅子烘乾再搗為末用或以糯糊和作餅及酒炒皆不佳洪氏容齋隨筆云艾難著力若入白茯苓三五片同碾即時可作細末亦一異也青蒿斆曰凡使惟中為妙到膝即仰到腰即俯使子勿使葉使根勿使莖四件若同使翻然成痼疾採得葉用七歲兒七個溺浸七日七夜漉出曬乾角蒿斆曰凡使勿用紅蒿並邪蒿二味真似角蒿只是此香而角短爾採得於槐砧上細銼用之茺蔚時珍曰凡用微炒香亦或蒸熟烈日曝燥舂簸去殼取仁用劉寄奴草斆曰凡採得去莖葉只用實以布拭去薄殼令淨拌酒蒸從巳至申曝乾用時珍曰莖葉花子皆可用旋覆花斆曰採得花去蕊並殼皮及蒂子蒸之從巳至午曬乾用青葙斆曰凡用先燒鐵杵臼乃搗用之續斷斆曰凡採得根橫切銼之又去向里硬筋以酒浸一伏時焙乾入藥用漏蘆斆曰凡採得漏蘆細銼以生甘草相對拌蒸之從巳至申揀出曬乾用飛廉斆曰凡用根先刮去粗皮杵細以苦酒拌一夜漉出日乾細杵用葫蘆巴時珍曰凡入藥淘淨以酒浸一宿曬乾蒸熟或炒過用蠡實時珍曰凡入藥炒過用治疝則以醋拌炒之惡實斆曰凡用揀淨以酒拌蒸待有白霜重出以布拭去焙乾搗粉用枲耳大明曰入藥炒熟搗去刺用或酒拌蒸過用斆曰凡採得去心取黃精以竹刀細切拌之蒸從巳至亥時出去黃精陰乾用蘘荷斆曰凡使勿用革牛草真相似其革牛草腥澀凡使白蘘荷以銅刀刮去粗皮一重細切入砂盆中研如膏取自然汁煉作煎新器攤冷如干膠狀刮取用之麻黃弘景曰用之折去節根水煮十餘沸以竹片掠去上沫沫令人煩根節能止汗故也燈心草時珍曰燈心難研以粳米粉漿染過曬乾研末入水澄之浮者是燈心也曬乾用乾地黃藏器曰乾地黃本經不言生干及蒸乾方家所用二物各別蒸乾即溫補生干即平宣當依此法用時珍曰本經所謂乾地黃者即生地黃之乾者也其法取地黃一百斤擇肥者六十斤洗淨曬令微皺以揀下者洗淨木臼中搗絞汁盡投酒更搗取汁拌前地黃日中曬乾或火焙乾用熟地黃頌曰作熟地黃法取肥地黃三二十斤淨洗別以揀下瘦短者三二十斤搗絞取汁投石器中浸漉令浹甑上浸三四過時時浸濾轉蒸訖又曝使汁盡其地黃當光黑如漆味甘如飴須瓷器收之以其脂柔喜潤也斆曰採生地黃去皮瓷鍋上柳木甑蒸之攤令氣歇拌酒再蒸又出令乾勿犯銅鐵器令人腎消併發白男損營女損衛也時珍曰近時造法揀取沉水肥大者以好酒入縮砂仁末在內拌勻柳木甑於瓦鍋內蒸令氣透晾乾再以砂仁酒拌蒸晾如此九蒸九晾乃止蓋地黃性泥得砂仁之香而竄合和五臟沖和之氣歸宿丹田故也今市中惟以酒煮售者不可用牛膝斆曰凡使去頭蘆以黃精自然汁浸一宿漉出銼焙乾用時珍曰今惟以酒浸入藥欲下則生用滋補則焙用或酒拌蒸過用紫菀斆曰凡使先去須有白如練色者號曰羊須草自然不同去頭及土用東流水洗淨以蜜浸一宿至明於火上焙乾用一兩用蜜二分麥門冬弘景曰凡用取肥大者湯澤抽去心不爾令人煩大抵一斤須減去四五兩也時珍曰凡入湯液以滾水潤濕少頃抽去心或以瓦焙軟乘熱去心若入丸散須瓦焙熱即於風中吹冷如此三四次即易燥且不損藥力或以湯浸搗膏和藥亦可滋補藥則以酒浸擂之敗醬斆曰凡收得便粗杵入甘草葉相拌對蒸從巳至未去甘草葉焙乾用款冬花斆曰凡採得須去向里裹花蕊殼並向裡實如慄零殼者並枝葉以甘草水浸一宿卻取款冬葉相拌裛一夜曬乾去葉用瞿麥斆曰凡使只用蕊殼不用莖葉若一時同使即空心令人氣噎小便不禁也用時以䈽竹瀝浸一伏時漉曬王不留行斆曰凡採得拌濕蒸之從巳至未以漿水浸一宿焙乾用葶藶斆曰凡使葶藶以糯米相合置於燠上微焙待米熟去米搗用解張紹堂本作灶義長車前時珍曰凡用子須以水淘洗去泥沙曬乾入湯液炒過用入丸散則以酒浸一夜蒸熟研爛作餅曬乾焙研斆曰凡使須一窠有九葉內有蕊莖可長一尺二寸者和蕊葉根去土了稱一鎰者力全使葉勿使蕊莖銼細於新瓦上攤乾用虎杖斆曰採得細銼卻用葉包一夜曬乾用蒺藜斆曰凡使揀淨蒸之從午至酉日乾木臼舂令刺盡用酒拌再蒸從午至酉日乾用大明曰入藥不計丸散並炒去刺用大黃雷曰凡使細切以文如水旋斑緊重者銼片蒸之從巳至未曬乾又灑臘水蒸之從未至亥如此凡七次曬乾卻灑淡蜜水再蒸一伏時其大黃必如烏膏樣乃曬乾用藏器曰凡用有蒸有生有熟不得一概用之承曰大黃採時皆以火石爆乾貨賣更無生者用之亦不須更多炮炙蒸煮商陸斆曰取花白者根銅刀刮去皮薄切以東流水浸兩宿漉出架甑蒸以黑豆葉一重商陸一重如此蒸之從午至亥取出去豆葉曝乾銼用無豆葉以豆代之防葵斆曰凡使須揀去蚛末用甘草湯浸一宿漉出曝乾用黃精自然汁一二升拌了土器中炒至汁盡用大戟斆曰凡使勿用附生者誤服令人泄氣不禁即煎薺苨湯解之採得後於槐砧上細銼與海芋葉拌蒸從巳至申去芋葉曬乾用時珍曰凡採得以漿水煮軟去骨曬乾用海芋葉麻而有毒恐不可用也甘遂斆曰凡採得去莖於槐砧上細銼用生甘草湯薺苨自然汁二味攪浸三日其水如墨汁乃漉出用東流水淘六七次令水清為度漉出於土器中熬脆用之時珍曰今人多以麵裹煨熟用以去其毒續隨子時珍曰凡用去殼取色白者以紙包壓去油取霜用莨菪斆曰修事莨菪子十兩以頭醋一鎰煮乾為度卻用黃牛乳汁浸一宿至明白乳汁黑即是真者曬乾搗篩用雲實斆曰凡採得粗搗相對拌渾顆橡實蒸一日揀出曝乾蓖麻子斆曰凡使勿用黑天赤利子緣在地蔞上生是顆兩頭尖有毒其蓖麻子節節有黃黑斑凡使以鹽湯煮半日去皮取子研用時珍曰取蓖麻油法用蓖麻仁五升搗爛以水一斗煮之有沫撇起待沫盡乃止去水以沫煎至點燈不炸滴水不散為度常山斆曰採時連根苗收如用莖葉臨時去根以甘草細銼同水拌濕蒸之臨時去甘草取蜀漆細銼又拌甘草水勻再蒸日乾用其常山凡用以酒浸一宿漉出日乾熬搗用時珍曰近時有酒浸蒸熟或瓦炒熟者亦不甚吐人又有醋製者吐人藜蘆雷曰凡採得去頭用糯米泔汁煮之從巳至未曬乾用附子保升曰附子烏頭天雄側子烏喙採得以生熟湯浸半日勿令滅氣出以白灰裛之數易使干又法以米粥及糟曲等淹之並不及前法頌曰五物收時一處造釀其法先於六月內造大小面曲未採前半月用大麥煮成粥以曲造醋候熟去糟其醋不用太酸酸則以水解之將附子去根鬚於新甕內淹七日日攪一遍撈出以疏篩攤之令生白衣乃向慢風日中曬之百十日以透干為度若猛日則皺而皮不附肉時珍曰按附子記云此物畏惡最多不能常熟或種美而苗不茂或苗秀而根不充或以釀而腐或以曝而攣若有神物陰為之者故園人常禱於神目為藥妖其釀法用醋醅安密室中淹覆彌月乃發出晾乾方出釀時其大有如拳者已定輒不盈握故及一兩者極難得土人云但得半兩以上者皆良蜀人餌者少惟秦陝閩浙人宜之然秦人才市其下者閩浙才得其中者其上品則皆貴人得之矣弘景曰凡用附子烏頭天雄皆熱灰微炮令拆勿過焦惟姜附湯生用之俗方每用附子須甘草人參生薑相配者正制其毒故也斆曰凡使烏頭宜文武火中炮令皴拆擘破用若用附子須底平有九角如鐵色一個重一兩者即是氣全勿用雜木火只以柳木灰火中炮令皴拆以刀刮去上孕子並去底尖擘破於屋下平地上掘一土坑安之一宿取出焙乾用若陰制者生去皮尖底薄切以東流水並黑豆浸五日夜漉出日中曬乾用震亨曰凡烏附天雄須用童子小便浸透煮過以殺其毒並助下行之力入鹽少許尤好或以小便浸二七日揀去壞者以竹刀每個切作四片井水淘淨逐日換水再浸七日曬乾用時珍曰附子生用則發散熟用則峻補生用者須如陰制之法去皮臍入藥熟用者以水浸過炮令發拆去皮臍乘熱切片再炒令內外俱黃去火毒入藥又法每一個用甘草二錢鹽水薑汁童尿各半盞同煮熟出火毒一夜用之則毒去也天雄斆曰宜炮皴去皮尖底用或陰制如附子法亦得大明曰凡丸散炮去皮用飲藥即和皮生使甚佳時珍曰熟用一法每十兩以酒浸七日掘土坑用炭半枰煅赤去火以醋二升沃之候乾乘熱入天雄在內小盆合一夜取出去臍用之枰即獨坐板床側子同附子烏頭時珍曰草烏頭或生用或炮用或以烏大豆同煮熟去其毒用天南星頌曰九月採虎掌根去皮臍入器中湯浸五七日日換三四遍洗去涎曝乾用或再火炮裂用時珍曰凡天南星須用一兩以上者佳治風痰有生用者須以溫湯洗淨仍以白礬湯或入皂角汁浸三日夜日日換水曝乾用若熟用者須於黃土地掘一小坑深五六寸以炭火燒赤以好酒沃之安南星於內瓦盆覆定灰泥固濟一夜取出用急用即以濕紙包於煻灰火中炮裂也一法治風熱痰以酒浸一宿桑柴火蒸之常灑酒入甑內令氣猛一伏時取出竹刀切開味不麻舌為熟未熟再蒸至不麻乃止脾虛多痰則以生薑渣和黃泥包南星煨熟去泥焙用造南星曲法以薑汁礬湯和南星末作小餅子安籃內楮葉包蓋待上黃衣乃取曬收之造膽星法以南星生研末臘月取黃牯牛膽汁和劑納入膽中系懸風處干之年久者彌佳半夏弘景曰凡用以湯洗十許過令滑盡不爾有毒戟人咽喉方中有半夏必須用生薑者以制其毒故也斆曰修事半夏四兩用白芥子末二兩釅醋六兩攪濁將半夏投中洗三遍用之若洗涎不盡令人氣逆肝氣怒滿時珍曰今治半夏惟洗去皮垢以湯泡浸七日逐日換湯晾乾切片薑汁拌焙入藥或研為末以薑汁入湯浸澄三日瀝去涎水曬乾用謂之半夏粉或研末以薑汁和作餅子日乾用謂之半夏餅或研末以薑汁白礬湯和作餅楮葉包置籃中待生黃衣日乾用謂之半夏曲白飛霞醫通云痰分之病半夏為主造而為曲尤佳治濕痰以薑汁白礬湯和之治風痰以薑汁及皂莢煮汁和之治火痰以薑汁竹瀝或荊瀝和之治寒痰以薑汁礬湯入白芥子末和之此皆造麴妙法也射干斆曰凡採根先以米泔水浸一宿漉出然後以䈽竹葉煮之從午至亥日乾用芫花弘景曰用當微熬不可近眼時珍曰芫花留數年陳久者良用時以好醋煮十數沸去醋以水浸一宿曬乾用則毒滅也或以醋炒者次之莽草斆曰凡使取葉細銼以生甘草水蓼二味同盛入生稀絹袋中甑中蒸一日去二件曬乾用菟絲子斆曰凡使勿用天碧草子真相似只是味酸澀並黏也菟絲採得去殼了用苦酒浸二日漉出以黃精自然汁相對浸一宿至明用微火煎至干入臼中燒熱鐵杵一去三千餘杵成粉用之時珍曰凡用以溫水淘去沙泥酒浸一宿曝乾搗之不盡者再浸曝搗須臾悉細又法酒浸四五日蒸曝四五次研作餅焙乾再研末或云曝乾時入紙條數枚同搗即刻成粉且省力也五味子斆曰凡用以銅刀劈作兩片用蜜浸蒸從巳至申卻以漿浸一宿焙乾用時珍曰入補藥熟用入嗽藥生用覆盆子詵曰覆盆子五月採之烈日曝乾不爾易爛雷曰凡使用東流水淘去黃葉並皮蒂取子以酒拌蒸一宿以東流水淘兩遍又曬乾方用時珍曰採得搗作薄餅曬乾密貯臨時以酒拌蒸尤妙馬兜鈴斆曰凡採得實去葉及蔓以生絹袋盛於東屋角畔待乾劈開去革膜取淨子焙用牽牛子斆曰凡採得子曬乾水淘去浮者再曬拌酒蒸從巳至未曬乾收之臨用舂去黑皮時珍曰今多隻碾取頭末去皮麩不用亦有半生半熟用者栝蔞斆曰凡使皮子莖根其效各別其栝圓黃皮厚蒂小蔞則形長赤皮蒂粗陰人服蔞陽人服栝並去殼革膜及油用根亦取大二三圍者去皮搗爛以水澄粉用時珍曰栝蔞古方全用後世乃分子瓤各用天花粉周定王曰秋冬採根去皮寸切水浸逐日換水四五日取出搗泥以絹袋濾汁澄粉曬乾用天門冬弘景曰門冬採得蒸剝去皮食之甚甘美止飢雖曝乾尤脂潤難搗必須曝於日中或火烘之今人呼苗為棘刺煮作飲宜人而終非真棘刺也頌曰二三七八月採根蒸剝去皮四破去心曝乾用斆曰採得去皮心用柳木甑及柳木柴蒸一伏時灑酒令遍更添火蒸作小架去地二尺攤於上曝乾用百部斆曰凡採得以竹刀劈去心皮花作數十條懸檐下風乾卻用酒浸一宿漉出焙乾銼用或一窠八十三條者號曰地仙苗若修事餌之可千歲也何首烏志曰春夏秋採其根雌雄並用乘濕以布拭去土曝乾臨時以苦竹刀切米泔浸經宿曝乾木杵臼搗之忌鐵器慎微曰方用新採者去皮銅刀切薄片入甑內以瓷鍋蒸之旋以熱水從上淋下勿令滿溢直候無氣味乃取出曝乾用時珍曰近時製法用何首烏赤白各一斤竹刀刮去粗皮米泔浸一夜切片用黑豆三斗每次用三升三合三勺以水泡過砂鍋內鋪豆一層首烏一層重重鋪盡蒸之豆熟取出去豆將何首烏曬乾再以豆蒸如此九蒸九曬乃用女葳斆曰凡採得陰乾去頭並白蕊於槐砧上銼拌豆淋酒蒸之從巳至未出曬乾茜草斆曰凡使用銅刀於槐砧上銼日乾勿犯鉛鐵器勿用赤柳草根真相似只是味酸澀誤服令人患內障眼速服甘草水解之即毒氣散防己斆曰凡使勿用木條色黃腥皮皺上有丁足子不堪用惟要心有花紋黃色者細銼以車前草根相對蒸半日曬乾取用時珍曰今人去皮銼酒洗曬乾用赤地利斆曰凡採得細銼用藍葉並根同入生絹袋盛之蒸一伏時去藍曬用絡石雷曰凡採得用粗布揩去毛了以熟甘草水浸一伏時切曬用澤瀉斆曰不計多少細銼酒浸一宿取出曝乾任用菖蒲斆曰凡使勿用泥菖夏菖二件如竹根鞭形黑氣穢味腥惟石上生者根條嫩黃緊硬節稠一寸九節者是真也採得以銅刀刮去黃黑硬節皮一重以嫩桑枝條相拌蒸熟曝乾銼用時珍曰服食須如上法制若常用但去毛微炒耳蒲黃斆曰凡使勿用松黃並黃蒿其二件全似只是味跙及吐人真蒲黃鬚隔三重紙焙令色黃蒸半日卻再焙乾用之妙大明曰破血消腫者生用之補血止血者須炒用水萍時珍曰紫背浮萍七月採之揀淨以竹篩攤曬下置水一盆映之即易干色海藻斆曰凡使須用生烏豆並紫背天葵三件同蒸一伏時日乾用時珍曰近人但洗淨鹹味焙乾用昆布斆曰凡使昆布每一斤用甑箅大小十個同銼細以東流水煮之從巳至亥待鹹味去乃曬焙用石斛斆曰凡使去根頭用酒浸一宿曝乾以酥拌蒸之從巳至酉徐徐焙乾用入補藥乃效骨碎補斆曰凡採得用銅刀刮去黃赤毛細切蜜拌潤甑蒸一日曬乾用急用只焙乾不蒸亦得也石葦別錄曰凡用去黃毛毛射人肺令人咳不可療大明曰入藥去梗須微炙用一法以羊脂炒乾用卷柏時珍曰凡用以鹽水煮半日再以井水煮半日曬乾焙用馬勃時珍曰凡用以生布張開將馬勃於上摩擦下以盤承取末用
