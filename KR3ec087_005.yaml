body:
  text: 卷五果菜米穀類山楂時珍曰九月霜後取帶熟者去核曝乾或蒸熟去皮核搗作餅子日乾用白柿時珍曰白柿即乾柿生霜者其法用大柿去皮捻扁日曬夜露至干內甕中待生白霜乃取出今人謂之柿餅亦曰柿花其霜謂之柿霜醂柿瑞曰水藏者性冷鹽藏者有毒時珍曰醂藏柿也水收鹽浸之外又有以熟柿用灰汁澡三四度令汁盡著器中經十餘日即可食治病非宜柿糕時珍曰案李氏食經云用糯米洗淨一斗大幹柿五十個同搗粉蒸食如干入煮棗泥和拌之石榴皮斆曰凡使榴皮葉根勿犯鐵並不計乾溼皆以漿水浸一夜取出用其水如墨汁也黃橘皮斆曰凡使勿用柚皮皺子皮二件用不得凡修事須去白膜一重銼細以鯉魚裹一宿至明取用宗奭曰本草橘柚作一條蓋傳誤也後世不知以柚皮為橘皮是貽無窮之患矣此乃六陳之一天下日用所須今人又多以乳柑皮亂之不可不擇也柑皮不甚苦橘皮極苦至熟亦苦或以皮之緊慢分別又因方土不同亦互有緊慢也時珍曰橘皮紋細色紅而薄內多筋脈其味苦辛柑皮紋粗色黃而厚內多白膜其味辛甘柚皮最厚而虛紋更粗色黃內多膜無筋其味甘多辛少但以此別之即不差矣橘皮性溫柑柚皮性冷不可不知今天下多以廣中來者為勝江西者次之然亦多以柑皮雜之柑皮猶可用柚皮則懸絶矣凡橘皮入和中理胃藥則留白入下氣消痰藥則去白其説出於聖濟經去白者以白湯入鹽洗潤透刮去筋膜曬乾用亦有煮焙者各隨本方青橘皮時珍曰青橘皮乃橘之未黃而青色者薄而光其氣芳烈今人多以小柑小柚小橙偽為之不可不慎辨之入藥以湯浸去瓤切片醋拌瓦炒過用橘核時珍曰凡用須以新瓦焙香去殼取仁研碎入藥薯蕷頌曰採白根刮去黃皮以水浸之糝白礬末少許入水中經宿淨洗去涎焙乾用宗奭曰入藥貴生干之故古方皆用乾山藥蓋生則性滑不可入藥熟則滯氣只堪啖耳其法冬月以布裹手用竹刀刮去皮竹篩盛置簷風處不得見日一夕干五分候全乾收之或置焙籠中微火烘乾亦佳斆曰凡使勿用平田生二三紀者須要山中生經十紀者皮赤四面有須者妙採得以銅刀刮去赤皮洗去涎蒸過曝乾用李根皮時珍曰李根皮取東行者刮去皺皮炙黃入藥用別録不言用何等李根亦不言其味但藥性論云入藥用苦李根皮味鹹而張仲景治奔豚氣奔豚湯中用甘李根白皮則甘苦二種皆可用歟杏仁別録曰五月採之弘景曰凡用杏仁以湯浸去皮尖炒黃或用面麩炒過斆曰凡用以湯浸去皮尖每斤入白火石一斤烏豆三合以東流水同煮從巳至午取出曬乾用時珍曰治風寒肺病藥中亦有連皮尖用者取其發散也烏梅弘景曰用須去核微炒之時珍曰造法取青梅籃盛於突上燻黑若以稻灰淋汁潤濕蒸過則肥澤不蠹又白梅霜梅取大青梅以鹽汁漬之日曬夜漬十日成矣久乃上霜桃核仁別録曰七月採取仁陰乾斆曰凡使須去皮用白朮烏豆二味同於坩鍋中煮二伏時漉出劈開心黃如金色乃用時珍曰桃仁行血宜連皮尖生用潤燥活血宜湯浸去皮尖炒黃用或麥麩同炒或燒存性各隨本方雙仁者有毒不可食桃花別録曰三月三日採陰乾之斆曰桃花勿用千葉者令人鼻衄不止目黃收花揀淨以絹袋盛懸簷下令乾用桃莖及白皮時珍曰樹皮根皮皆可用根皮尤良並取東行者刮去粗皮取白皮入藥桃膠時珍曰桃茂盛時以刀割樹皮久則膠溢出採收以桑灰湯浸過曝乾用如服食當依本方修煉木瓜斆曰凡使木瓜勿犯鐵器以銅刀削去硬皮並子切片曬乾以黃牛乳汁拌蒸從巳至未待如膏煎乃曬用也時珍曰今人但切片曬乾入藥爾按大明會典宣州歲貢烏爛蟲蛀木瓜入御藥局亦取其陳久無木氣如栗子去木氣之義爾枇杷葉恭曰凡用須火炙以布拭去毛不爾射入肺令咳不已或以粟稈作刷刷之尤易潔淨斆曰凡採得稱濕葉重一兩乾者三葉重一兩乃為氣足堪用粗布拭去毛以甘草湯洗一遍用綿再拭乾每一兩以酥二錢半塗上炙過用時珍曰治胃病以薑汁塗炙治肺病以蜜水塗炙乃良橡實雷曰霜後收採去殼蒸之從巳至未銼作五片日乾用周定王曰取子換水浸十五次淘去澀味蒸極熟食之可以濟飢橡實的鬥殼大明曰入藥並宜搗細炒焦或燒存性研用槲若頌曰若即葉之名也入藥須微炙令焦檳榔斆曰頭圓矮毗者為榔形尖紫紋者為檳檳力小榔力大凡使用白檳及存坐穩正心堅有錦紋者為妙半白半黑並心虛者不入藥用以刀刮去底細切之勿令經火恐無力若熟使不如不用時珍曰近時方藥亦有以火煨焙用者然初生白檳榔須本境可得若他處者必經煮熏安得生者耶又檳榔生食必以扶留藤古賁灰為使相合嚼之吐去紅水一口乃滑美不澀下氣消食此三物相去甚遠為物各異而相成相合如此亦為異矣俗謂檳榔為命賴扶留以此古賁灰即蠣蚌灰也賁乃蚌字之訛瓦屋子灰亦可用大腹子思邈曰鴆鳥多集檳榔樹上凡用檳榔皮宜先以酒洗後以大豆汁再洗過曬乾入灰火燒煨切用椰子頌曰不拘時月採其根皮入藥炙用一云其實皮亦可用蜀椒斆曰凡使南椒須去目及閉口者以酒拌濕蒸從巳至午放冷密蓋無氣後取出便入瓷器中勿令傷風也宗奭曰凡用秦椒蜀椒並微炒使出汗乘熱入竹筒中以梗搗去裡面黃殼取紅用未盡再搗或只炒熱隔紙鋪地上以碗覆待冷碾取紅用蓽澄茄斆曰凡採得去柄及皺皮了用酒浸蒸之從巳至酉杵細曬乾入藥用吳茱萸斆曰凡使去葉梗每十兩以鹽二兩投東流水四斗中分作一百度洗之自然無涎日乾入丸散用之若用醋煮者每十兩用醋一鎰煮三十沸後入茱萸熬乾用宗奭曰凡用吳茱萸須深湯中浸去苦烈汁七次始可焙用甜瓜子仁斆曰凡收得曝乾杵細馬尾篩篩過成粉以紙三重裹壓去油用不去油其力短也西瓜子仁同甜瓜蒂斆曰凡使勿用白瓜蒂要取青緑色瓜氣足時其蒂自然落在蔓上採得系屋東有風處吹乾用宗奭曰此甜瓜蒂也去瓜皮用蒂約半寸許曝極干臨時研用時珍曰按唐瑤云甜瓜蒂以團而短瓜團瓜者良若香甜瓜長如瓠子者皆供菜之瓜其蒂不可用也蓮實弘景曰藕實即蓮子八九月採黑堅如石者干搗破之頌曰其菂至秋黑而沉水為石蓮子可磨為飯食時珍曰石蓮剁去黑殼謂之蓮肉以水浸去赤皮青心生食甚佳入藥須蒸熟去心或曬或焙乾用亦有每一斤用獖豬肚一個盛貯煮熟搗焙用者今藥肆一種石蓮子狀如土石而味苦不知何物也荷葉大明曰入藥並炙用芡實詵曰凡用蒸熟烈日曬裂取仁亦可舂取粉用時珍曰新者煮食良入澀精藥連殼用也可案劉跂暇日記云芡實一斗以防風四兩煎湯浸過用且經久不壞韭子大明曰入藥揀淨蒸熟曝乾簸去黑皮炒黃用胡蔥斆曰凡採得依紋擘碎用緑梅子相對拌蒸一伏時去梅子砂盆中研如膏瓦器曬乾用灰藋斆曰灰藋即金鎖天葉撲蔓翠上往往有金星堪用若白青色者是忌女莖不中用也若使金鎖天莖高二尺五六寸為妙若長若短皆不中使凡用勿令犯水去根日乾以布拭去肉毛令盡細銼焙乾用之時珍曰妓女莖即地膚子苗與灰藋莖相似而葉不同亦可為蔬胡麻弘景曰服食胡麻取烏色者當九蒸九曝熬搗餌之斷谷長生充飢雖易得而學者未能常服況余藥耶蒸不熟令人發落其性與茯苓相宜俗方用之甚少時以合湯丸爾斆曰凡修事以水淘去浮者曬乾以酒拌蒸從巳至亥出攤曬乾臼中舂去粗皮留薄皮以小豆對拌同炒豆熟去豆用之大麻宗奭曰麻仁極難去殼取帛包置沸湯中浸至冷出之垂井中一夜勿令著水次日日中曝乾就新瓦上挼去殼簸揚取仁粒粒皆完張仲景麻仁丸即此大麻子中仁也薏苡仁斆曰凡使每一兩以糯米一兩同炒熟去糯米用亦有更以鹽湯煮過者罌粟殼時珍曰凡用以水洗潤去蒂及筋膜取外薄皮陰乾細切以米醋拌炒入藥亦有蜜炒蜜炙者扁豆時珍曰凡用取硬殼扁豆子連皮炒熟入藥亦有水浸去皮生用者從本方
